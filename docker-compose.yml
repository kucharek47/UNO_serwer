version: '3.8'

services:
  db:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - ./baza_danych_dane:/var/lib/postgresql/data
    restart: unless-stopped

  serwer:
    build: .
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - db
    restart: unless-stopped